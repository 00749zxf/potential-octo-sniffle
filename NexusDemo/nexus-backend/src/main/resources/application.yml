spring:
  application:
    name: nexus-backend

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nexus_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nexus.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器配置
server:
  port: 8083
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    com.nexus: DEBUG
    org.springframework.security: DEBUG
    org.springframework.jdbc: DEBUG
    org.mybatis: DEBUG
    java.sql: DEBUG

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# 自定义配置
nexus:
  jwt:
    secret: JJWnMa2cj1pGnGdazE+n5wxtJ6HBU0WJ284sBLpzLY8=
    expiration: 86400000 # 24小时
    token-header: Authorization
    token-prefix: "Bearer "